<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Salas - Cinema Online</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🎬 Cinema Online</div>
    <ul class="nav-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="cadastro-filmes.html">Filmes</a></li>
      <li><a href="cadastro-salas.html" class="active">Salas</a></li>
      <li><a href="cadastro-sessoes.html">Sessões</a></li>
      <li><a href="venda-ingressos.html">Ingressos</a></li>
      <li><a href="sessoes.html">Programação</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1 class="page-title">Cadastro de Salas</h1>
    <p class="page-subtitle">Preencha os dados da sala e clique em Salvar</p>

    <div id="alerta" class="alert hidden"></div>

    <div class="form-card">
      <div class="form-group">
        <label for="nome">Nome da Sala</label>
        <input type="text" id="nome" placeholder="Ex: Sala 1">
      </div>

      <div class="form-group">
        <label for="capacidade">Capacidade (pessoas)</label>
        <input type="number" id="capacidade" placeholder="Ex: 100" min="1">
      </div>

      <div class="form-group">
        <label for="tipo">Tipo</label>
        <select id="tipo">
          <option value="">-- Selecione --</option>
          <option value="2D">2D</option>
          <option value="3D">3D</option>
          <option value="IMAX">IMAX</option>
        </select>
      </div>

      <button class="btn-primary" onclick="salvarSala()">Salvar Sala</button>
    </div>

    <h2 style="color:#ffcc00; margin: 36px 0 12px;">Salas Cadastradas</h2>
    <div id="listaSalas"></div>
  </main>

  <script>
    let editandoId = null;

    carregarSalas();

    function salvarSala() {
      const nome       = document.getElementById('nome').value.trim();
      const capacidade = document.getElementById('capacidade').value;
      const tipo       = document.getElementById('tipo').value;

      if (!nome || !capacidade || !tipo) {
        mostrarAlerta('Preencha todos os campos!', 'error');
        return;
      }

      // Recupera o array de salas salvo no localStorage
      const salas = JSON.parse(localStorage.getItem('salas') || '[]');

      if (editandoId) {
        // Atualizar sala existente
        const index = salas.findIndex(s => s.id === editandoId);
        if (index !== -1) {
          salas[index] = {
            id: editandoId,
            nome,
            capacidade: parseInt(capacidade),
            tipo
          };
          localStorage.setItem('salas', JSON.stringify(salas));
          mostrarAlerta('Sala atualizada com sucesso!', 'success');
        }
      } else {
        const novaSala = {
          id: Date.now(),
          nome,
          capacidade: parseInt(capacidade),
          tipo
        };

        salas.push(novaSala);
        localStorage.setItem('salas', JSON.stringify(salas));
        mostrarAlerta('Sala salva com sucesso!', 'success');
      }

      limparFormulario();
      carregarSalas();
      resetarEdicao();
    }

    function editarSala(id) {
      const salas = JSON.parse(localStorage.getItem('salas') || '[]');
      const sala = salas.find(s => s.id === id);
      if (sala) {
        document.getElementById('nome').value = sala.nome;
        document.getElementById('capacidade').value = sala.capacidade;
        document.getElementById('tipo').value = sala.tipo;
        editandoId = id;
        document.querySelector('.btn-primary').textContent = 'Atualizar Sala';
      }
    }

    function deletarSala(id) {
      if (confirm('Tem certeza que deseja excluir esta sala?')) {
        const salas = JSON.parse(localStorage.getItem('salas') || '[]');
        const novasSalas = salas.filter(s => s.id !== id);
        localStorage.setItem('salas', JSON.stringify(novasSalas));
        mostrarAlerta('Sala excluída com sucesso!', 'success');
        carregarSalas();
      }
    }

    function resetarEdicao() {
      editandoId = null;
      document.querySelector('.btn-primary').textContent = 'Salvar Sala';
    }

    function carregarSalas() {
      const salas = JSON.parse(localStorage.getItem('salas') || '[]');
      const div = document.getElementById('listaSalas');

      if (salas.length === 0) {
        div.innerHTML = '<div class="empty-state"><p>Nenhuma sala cadastrada ainda.</p></div>';
        return;
      }

      let html = '<div class="table-wrapper"><table>';
      html += '<tr><th>Nome</th><th>Capacidade</th><th>Tipo</th><th>Ações</th></tr>';
      salas.forEach(s => {
        html += `<tr>
          <td>${s.nome}</td>
          <td>${s.capacidade} lugares</td>
          <td><span class="badge">${s.tipo}</span></td>
          <td>
            <button class="btn-edit" onclick="editarSala(${s.id})">Editar</button>
            <button class="btn-delete" onclick="deletarSala(${s.id})">Excluir</button>
          </td>
        </tr>`;
      });
      html += '</table></div>';
      div.innerHTML = html;
    }

    function limparFormulario() {
      ['nome', 'capacidade', 'tipo'].forEach(id => document.getElementById(id).value = '');
      resetarEdicao();
    }

    function mostrarAlerta(msg, tipo) {
      const el = document.getElementById('alerta');
      el.textContent = msg;
      el.className = `alert alert-${tipo}`;
      setTimeout(() => el.className = 'alert hidden', 3000);
    }
  </script>
</body>
</html>
